% ===========================================================================
% IWR6843 Vital Signs Configuration
% Optimized for: Breath (0.1-0.5Hz) & Heart (0.8-2.0Hz)
% Frame Rate: 20 FPS (50ms period)
% Range Resolution: ~4 cm
% Max Range: ~5 m
% ===========================================================================

sensorStop
flushCfg

% --- 系统输出模式 ---
dfeDataOutputMode 1

% --- 通道配置 (RX:4, TX:3) ---
channelCfg 15 7 0

% --- ADC 配置 (16-bit, Complex 1x) ---
adcCfg 2 1

% --- ADC 缓冲配置 ---
adcbufCfg -1 0 1 1 1

% --- 射频前端配置 (Profile) ---
% ID=0, Start=77GHz, Idle=7us, ADC start=7us, RampEnd=57.14us
% Slope=70MHz/us, Samples=256, SampleRate=5209ksps
profileCfg 0 77 429 7 57.14 0 0 70 1 256 5209 0 0 30

% --- 线性调频脉冲配置 (Chirp) ---
% 使用 TX1 和 TX3 进行 MIMO 发射 (增强信号强度)
chirpCfg 0 0 0 0 0 0 0 1
chirpCfg 1 1 0 0 0 0 0 4

% --- 帧结构配置 (Frame) ---
% Chirp Start=0, End=1, Loops=1, Frames=0(无限), Period=50ms, Trigger=1(软件), Delay=0
frameCfg 0 1 2 0 50 1 0

% --- 低功耗配置 (关闭) ---
lowPower 0 0

% --- GUI 监视器输出配置 ---
% 开启 Detect stats, Range Profile, Noise Profile 等
guiMonitor -1 1 1 0 0 0 1

% --- CFAR (恒虚警率) 检测阈值 ---
cfarCfg -1 0 2 8 4 3 0 15 1

% --- 核心：生命体征算法配置 (Vital Signs Specific) ---
% 参数解释:
% <start range m> <end range m> <breath win len> <heart win len> ...
% 监测范围: 0.2米 - 2.5米
vitalSignsCfg -1 0.2 2.5 40 100 0.5 1.5 1.0 3.0

% --- 运动检测配置 ---
motionDetection 1 0.5 5 100 0

% --- 启动传感器 ---
sensorStart